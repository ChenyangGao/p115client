<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P115 Tiny WebDAV - 疯狂宇宙主题驾驶舱</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mime-db@1.52.0/db.json">
    </script>
    <style>
        /* ===== 全局字体 & 基础重置 ===== */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            /* 暗色主题（默认） */
            --bg-dark: #0a0c1a;
            --bg-body: #05050f;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-purple: #9d4edd;
            --neon-green: #39ff14;
            --glass-bg: rgba(16, 18, 35, 0.65);
            --glass-border: rgba(0, 240, 255, 0.25);
            --text-main: #e2e8f0;
            --text-muted: #707e94;
            --text-secondary: #94a3b8;
            --card-bg: rgba(15, 20, 45, 0.75);
            --card-border: rgba(112, 0, 255, 0.3);
            --shadow-glow: rgba(0, 242, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.6);
            --table-header-bg: rgba(10, 16, 40, 0.85);
            --table-row-bg: rgba(10, 12, 32, 0.3);
            --table-row-hover: rgba(13, 22, 55, 0.5);
            --border-subtle: rgba(30, 41, 59, 0.4);
            --cyber-text-gradient: linear-gradient(90deg, #00f0ff, #ff007f, #39ff14, #00f0ff);
            --font-cyber: 'Rajdhani', 'Segoe UI', sans-serif;
            --font-orbitron: 'Orbitron', sans-serif;
            --toast-bg: rgba(16, 18, 35, 0.65);
            --toast-border: rgba(0, 240, 255, 0.6);
            --tooltip-bg: rgba(4, 8, 24, 0.88);
            --tooltip-border: #00f0ff;
            --breadcrumb-bg: rgba(0, 240, 255, 0.05);
            --breadcrumb-border: rgba(0, 240, 255, 0.1);
            --pilot-pulse-bg: #00f0ff;
            --pilot-pulse-shadow: 0 0 10px #00f0ff;
            --accent-primary: #00f2fe;
            --accent-secondary: #4facfe;
            --accent-glow: rgba(0, 242, 254, 0.6);
            --border-color: rgba(0, 242, 254, 0.3);
            --container-bg: rgba(10, 10, 25, 0.75);
        }

        /* ===== 亮色主题 ===== */
        [data-theme="light"] {
            --bg-dark: #eef2ff;
            --bg-body: #f5f7ff;
            --neon-blue: #0055aa;
            --neon-pink: #b3005e;
            --neon-purple: #5a2d9e;
            --neon-green: #008a2a;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(0, 80, 180, 0.25);
            --text-main: #1a1a2e;
            --text-muted: #627285;
            --text-secondary: #4a4a6e;
            --card-bg: rgba(255, 255, 255, 0.78);
            --card-border: rgba(0, 80, 180, 0.25);
            --shadow-glow: rgba(0, 80, 180, 0.10);
            --input-bg: rgba(255, 255, 255, 0.7);
            --table-header-bg: rgba(230, 235, 255, 0.92);
            --table-row-bg: rgba(255, 255, 255, 0.40);
            --table-row-hover: rgba(220, 230, 255, 0.65);
            --border-subtle: rgba(160, 180, 220, 0.5);
            --cyber-text-gradient: linear-gradient(90deg, #0055aa, #b3005e, #008a2a, #0055aa);
            --toast-bg: rgba(255, 255, 255, 0.85);
            --toast-border: rgba(0, 80, 180, 0.5);
            --tooltip-bg: rgba(255, 255, 255, 0.92);
            --tooltip-border: #0055aa;
            --breadcrumb-bg: rgba(0, 80, 180, 0.06);
            --breadcrumb-border: rgba(0, 80, 180, 0.15);
            --pilot-pulse-bg: #0055aa;
            --pilot-pulse-shadow: 0 0 10px #0055aa;
            --cyber-status-shadow: 0 0 6px rgba(0, 80, 180, 0.25);
            --accent-primary: #0052cc;
            --accent-secondary: #4facfe;
            --accent-glow: rgba(0, 82, 204, 0.3);
            --border-color: rgba(79, 172, 254, 0.4);
            --container-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        .font-mono {
            font-family: 'Roboto Mono', monospace;
        }

        /* ===== Three.js 背景容器 ===== */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        [data-theme="light"] #canvas-container {
            opacity: 0.55;
        }

        /* ===== 虫洞 Canvas ===== */
        #wormhole-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
            background-color: transparent;
        }
        ::-webkit-scrollbar-track {
            background: rgba(10, 10, 25, 0.2);
            border-radius: 3px;
        }
        [data-theme="light"] ::-webkit-scrollbar-track {
            background: rgba(200, 210, 240, 0.25);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(0, 242, 255, 0.7), rgba(112, 0, 255, 0.7));
            border-radius: 3px;
            border: 1px solid rgba(10, 14, 35, 0.3);
        }
        [data-theme="light"] ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(0, 80, 180, 0.5), rgba(90, 45, 158, 0.5));
            border: 1px solid rgba(200, 210, 240, 0.3);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00ffff;
            box-shadow: 0 0 8px #00ffff;
        }
        [data-theme="light"] ::-webkit-scrollbar-thumb:hover {
            background: #0055aa;
            box-shadow: 0 0 8px #0055aa;
        }

        .virtual-scroll-viewport {
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 242, 255, 0.7) rgba(10, 10, 25, 0.2);
        }
        [data-theme="light"] .virtual-scroll-viewport {
            scrollbar-color: rgba(0, 80, 180, 0.5) rgba(200, 210, 240, 0.25);
        }

        /* Search Bar & Controls */
        .controls-row {
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-end;
        }

        .search-wrapper {
            position: relative;
            width: 300px;
            transition: all 0.3s ease;
        }

        .search-wrapper input {
            width: 100%;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            padding: 12px 15px 12px 40px;
            border-radius: 30px;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
        }

        .search-wrapper input:focus {
            box-shadow: 0 0 15px var(--accent-glow);
            width: 380px;
            border-color: var(--accent-primary);
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .search-wrapper input:focus + i {
            color: var(--accent-primary);
        }

        /* ===== 霓虹状态文字 ===== */
        .cyber-status-text {
            display: inline-block;
            font-family: var(--font-orbitron);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: var(--cyber-text-gradient);
            background-size: 300% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: cyber-scan 3s linear infinite, cyber-glitch 5s infinite;
            text-shadow: var(--cyber-status-shadow);
        }

        @keyframes cyber-scan {
            to {
                background-position: 300% center;
            }
        }

        @keyframes cyber-glitch {
            0%,
            100% {
                transform: skew(0deg);
                filter: drop-shadow(0 0 2px var(--neon-blue));
            }
            1%,
            3% {
                transform: skew(-10deg);
                filter: drop-shadow(2px 0 0px var(--neon-pink));
            }
            2%,
            4% {
                transform: skew(10deg);
                filter: drop-shadow(-2px 0 0px var(--neon-green));
            }
            5%,
            95% {
                transform: skew(0deg);
                filter: drop-shadow(0 0 5px rgba(0, 240, 255, 0.5));
            }
        }
        [data-theme="light"] .cyber-status-text {
            text-shadow: 0 0 6px rgba(0, 80, 180, 0.25);
        }

        /* ===== 玻璃拟态面板 ===== */
        .sci-fi-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 25px var(--shadow-glow), inset 0 0 15px rgba(0, 242, 255, 0.03);
            transition: all 0.5s ease;
            color: var(--text-main);
        }
        [data-theme="light"] .sci-fi-panel {
            box-shadow: 0 0 25px rgba(0, 80, 180, 0.08), inset 0 0 15px rgba(0, 80, 180, 0.02);
        }

        .sci-fi-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            margin: 20px;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s, background 0.3s, backdrop-filter 0.3s;
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.1);
            clip-path: inset(0 0 0 0);
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            color: var(--text-main);
        }

        .sci-fi-card:hover {
            border-color: var(--neon-blue);
            backdrop-filter: blur(4px);
            background: rgba(10, 14, 35, 0.2);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 0 35px rgba(0, 242, 255, 0.4), inset 0 0 15px rgba(0, 242, 255, 0.3);
        }
        [data-theme="light"] .sci-fi-card:hover {
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 35px rgba(0, 80, 180, 0.25), inset 0 0 15px rgba(0, 80, 180, 0.10);
        }

        .space-normal {
            white-space: normal;
            word-wrap: break-word;
        }

        .breadcrumb-item {
            color: var(--neon-blue);
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 6px;
            transition: all 0.3s ease;
            background: var(--breadcrumb-bg);
            border: 1px solid var(--breadcrumb-border);
        }

        .breadcrumb-item:hover {
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            color: #fff;
            text-shadow: 0 0 5px var(--neon-blue);
        }
        [data-theme="light"] .breadcrumb-item:hover {
            background: rgba(0, 80, 180, 0.15);
            box-shadow: 0 0 10px rgba(0, 80, 180, 0.25);
            color: var(--neon-blue);
        }

        /* ===== 霓虹按钮 ===== */
        .neon-btn {
            position: relative;
            overflow: hidden;
            transition: 0.5s;
            justify-content: center;
            width: 100%;
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }
        .neon-btn:hover {
            background: var(--neon-blue);
            color: #05050f;
            box-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue), 0 0 80px var(--neon-blue);
        }
        [data-theme="light"] .neon-btn:hover {
            color: #fff;
        }

        .stealth-btn {
            position: relative;
            overflow: hidden;
            transition: 0.5s;
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            justify-content: center;
            width: 100%;
        }
        .stealth-btn:hover {
            background: var(--neon-pink);
            color: #05050f;
            box-shadow: 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink), 0 0 80px var(--neon-pink);
        }
        [data-theme="light"] .stealth-btn:hover {
            color: #fff;
        }
        .stealth-btn.active {
            background: var(--neon-green);
            color: #05050f;
            border-color: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--neon-green);
        }
        [data-theme="light"] .stealth-btn.active {
            color: #fff;
        }

        .card-meta-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 6px 10px;
            background: rgba(221, 221, 221, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.2s;
        }

        .meta-item:hover {
            background: rgba(0, 242, 254, 0.05);
            border-color: rgba(0, 242, 254, 0.2);
        }

        .meta-item.full-width {
            grid-column: span 2;
        }

        .meta-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== 主题切换按钮（右上角） ===== */
        .theme-toggle-btn {
            transition: 0.4s ease;
            border-color: rgba(0, 240, 255, 0.4);
            background: rgba(10, 14, 35, 0.7);
            backdrop-filter: blur(8px);
            color: var(--neon-blue);
        }
        .theme-toggle-btn:hover {
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            transform: scale(1.05) rotate(15deg);
        }
        [data-theme="light"] .theme-toggle-btn {
            border-color: rgba(0, 80, 180, 0.3);
            background: rgba(255, 255, 255, 0.7);
            color: #0055aa;
        }
        [data-theme="light"] .theme-toggle-btn:hover {
            background: rgba(0, 80, 180, 0.15);
            box-shadow: 0 0 20px rgba(0, 80, 180, 0.2);
        }

        .card-item-icon:hover {
            text-shadow: 0 0 4px #fff, 0 0 10px #00eeff, 0 0 22px #00eeff, 0 0 45px #00aacc;
        }
        [data-theme="light"] .card-item-icon:hover {
            text-shadow: 0 0 4px rgba(0, 80, 180, 0.3), 0 0 10px rgba(0, 80, 180, 0.2);
        }

        .card-item-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-item-text:hover {
            color: #00eeff;
        }
        [data-theme="light"] .card-item-text:hover {
            color: #0055aa;
        }

        /* ===== 彩虹波浪文字 ===== */
        @keyframes waveRainbowText {
            0% {
                background-position: 0% 50%;
                transform: translateY(0px) skew(0deg);
            }
            25% {
                transform: translateY(-4px) skew(-3deg);
                filter: hue-rotate(45deg);
            }
            50% {
                background-position: 100% 50%;
                transform: translateY(3px) skew(3deg);
                filter: hue-rotate(180deg);
            }
            75% {
                transform: translateY(-2px) skew(-2deg);
                filter: hue-rotate(270deg);
            }
            100% {
                background-position: 0% 50%;
                transform: translateY(0px) skew(0deg);
                filter: hue-rotate(360deg);
            }
        }
        @keyframes fastWaveShaking {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            20% {
                transform: translate(-5px, 4px) scale(1.02) skew(-5deg);
            }
            40% {
                transform: translate(5px, -3px) scale(0.98) skew(5deg);
            }
            60% {
                transform: translate(-3px, 3px) scale(1.01) skew(-3deg);
            }
            80% {
                transform: translate(3px, -4px) scale(0.99) skew(3deg);
            }
        }
        .wave-rainbow-text {
            animation: waveRainbowText 6s ease infinite alternate;
            background: linear-gradient(45deg, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0000ff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            background-size: 400% 400%;
            display: inline-block;
        }
        .fast-shaking-active {
            animation: fastWaveShaking 0.12s linear infinite !important;
        }

        /* ===== Cyber 角标 ===== */
        .cyber-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--neon-pink);
            color: #fff;
            font-family: var(--font-orbitron);
            font-size: 9px;
            font-weight: bold;
            padding: 3px 12px;
            transform: rotate(45deg) translate(15px, -5px);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            z-index: 10;
        }
        .cyber-badge.dir {
            background: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        @keyframes rotateC {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .cosmic-radar {
            animation: rotateC 20s linear infinite;
        }

        /* ===== 飞行员脉冲 ===== */
        @keyframes pilotStatusGlow {
            0% {
                background-color: var(--pilot-pulse-bg);
                box-shadow: var(--pilot-pulse-shadow);
            }
            33% {
                background-color: var(--neon-green);
                box-shadow: 0 0 10px var(--neon-green);
            }
            66% {
                background-color: var(--neon-pink);
                box-shadow: 0 0 10px var(--neon-pink);
            }
            100% {
                background-color: var(--pilot-pulse-bg);
                box-shadow: var(--pilot-pulse-shadow);
            }
        }
        .pilot-pulse {
            animation: pilotStatusGlow 4s infinite ease-in-out, ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        /* ===== 量子风暴 ===== */
        @keyframes stormFlash {
            0%,
            100% {
                background: transparent;
            }
            10%,
            30% {
                background: rgba(0, 240, 255, 0.2);
                backdrop-filter: blur(20px);
            }
            20%,
            40% {
                background: rgba(255, 0, 127, 0.2);
                backdrop-filter: blur(20px);
            }
            50% {
                background: rgba(57, 255, 20, 0.15);
                backdrop-filter: blur(30px);
            }
        }
        .quantum-storm-active {
            animation: stormFlash 0.3s ease-in-out 8;
        }

        /* ===== 机器人语音特效 ===== */
        @keyframes speakAnimation {
            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 12px var(--neon-blue));
            }
            20% {
                transform: scale(1.15) translateY(-2px);
                filter: drop-shadow(0 0 20px var(--neon-blue));
            }
            40% {
                transform: scale(0.95);
                filter: drop-shadow(0 0 8px var(--neon-blue));
            }
            60% {
                transform: scale(1.08) translateY(-1px);
                filter: drop-shadow(0 0 18px var(--neon-blue));
            }
            80% {
                transform: scale(1.02);
                filter: drop-shadow(0 0 12px var(--neon-blue));
            }
        }
        @keyframes speakingGlow {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.6);
            }
        }
        .robot-speaking {
            animation: speakAnimation 0.6s ease-in-out infinite alternate;
        }
        .robot-speaking::before {
            content: '';
            position: absolute;
            inset: -8px;
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            animation: speakingGlow 1.2s ease-in-out infinite;
            z-index: -1;
        }
        @keyframes robotMouthOpen {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(4px) scaleY(1.3);
            }
        }
        .robot-mouth {
            display: inline-block;
            transform-origin: center bottom;
        }
        .robot-speaking .robot-mouth {
            animation: robotMouthOpen 0.3s ease-in-out infinite alternate;
        }

        /* ===== 响应式表格 ===== */
        @media (min-width: 900px) {
            .desktop-table-wrap {
                display: block;
            }
            .mobile-cards-wrap {
                display: none;
            }
        }
        @media (max-width: 899px) {
            .desktop-table-wrap {
                display: none;
            }
            .mobile-cards-wrap {
                display: block;
            }
            .search-wrapper { width: 100%; }
            .search-wrapper input:focus { width: 100%; }
        }

        /* ===== 表格表头 ===== */
        .sci-fi-table-header-wrapper {
            position: sticky;
            top: 0;
            z-index: 30;
            width: 100%;
            background: var(--table-header-bg) !important;
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px var(--shadow-glow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .sci-fi-table-header-wrapper:hover {
            background: var(--table-header-bg) !important;
            border-bottom-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6), inset 0 0 10px rgba(0, 242, 255, 0.4);
        }
        [data-theme="light"] .sci-fi-table-header-wrapper:hover {
            box-shadow: 0 0 20px rgba(0, 80, 180, 0.25), inset 0 0 10px rgba(0, 80, 180, 0.10);
        }

        .sci-fi-th {
            position: relative;
            padding: 16px 20px !important;

            letter-spacing: 1px;

            color: var(--neon-blue);
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.3);

            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 50%;
            width: 1px;
            background: linear-gradient(180deg, transparent, var(--glass-border), transparent);

        /* ===== 虚拟滚动 ===== */
        .virtual-scroll-viewport {
            position: relative;
            overflow-y: auto;
            will-change: transform;
            -webkit-overflow-scrolling: touch;
        }
        .virtual-scroll-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }
        .virtual-tr {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            display: flex;
            align-items: center;
            background: var(--table-row-bg);
            border-bottom: 1px solid var(--border-subtle);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .virtual-tr:hover {
            background: var(--table-row-hover) !important;
            backdrop-filter: blur(8px);
            border-color: var(--glass-border);
            box-shadow: inset 0 0 12px rgba(0, 242, 255, 0.3), 0 0 10px rgba(112, 0, 255, 0.2);
            z-index: 10;
        }
        [data-theme="light"] .virtual-tr:hover {
            box-shadow: inset 0 0 12px rgba(0, 80, 180, 0.15), 0 0 10px rgba(90, 45, 158, 0.10);
        }

        .virtual-td {
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            transition: background-color 0.2s, backdrop-filter 0.2s;
        }
        .virtual-tr:hover .virtual-td:hover {
            background: rgba(0, 242, 255, 0.12);
            backdrop-filter: blur(4px);
            box-shadow: inset 0 0 8px rgba(0, 242, 255, 0.2);
        }
        [data-theme="light"] .virtual-tr:hover .virtual-td:hover {
            background: rgba(0, 80, 180, 0.08);

        }

            0% {

            100% {

            pointer-events: none;
            position: fixed;
            z-index: 10000;
            background: var(--tooltip-bg);
            border: 1px solid var(--tooltip-border);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4), inset 0 0 10px rgba(0, 240, 255, 0.2);

            border-radius: 6px;

        function toggleTheme() {
            const html = document.documentElement;
            const body = document.getElementById('app-body');
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');

            if (currentTheme === 'dark') {
                html.setAttribute('data-theme', 'light');
                body.setAttribute('data-theme', 'light');
                currentTheme = 'light';
                icon.className = 'fa-solid fa-moon';
                text.innerText = '切换暗色';
                // 调整 Three.js 场景为亮色
                if (typeof window.applyThemeToThree === 'function') {
                    window.applyThemeToThree('light');
                }
                showToast('☀️ 已切换至亮白主题');
            } else {
                html.setAttribute('data-theme', 'dark');
                body.setAttribute('data-theme', 'dark');
                currentTheme = 'dark';
                icon.className = 'fa-solid fa-sun';
                text.innerText = '切换亮色';
                if (typeof window.applyThemeToThree === 'function') {
                    window.applyThemeToThree('dark');
                }
                showToast('🌙 已切换至暗黑主题');
            }
            // 保存偏好
            try {
                localStorage.setItem('p115-theme', currentTheme);
            } catch (_) {}
        }

        // 恢复保存的主题
        (function restoreTheme() {
            try {
                const saved = localStorage.getItem('p115-theme');
                if (saved === 'light' || saved === 'dark') {
                    currentTheme = saved;
                    const html = document.documentElement;
                    const body = document.getElementById('app-body');
                    const icon = document.getElementById('theme-icon');

        // ===== 以下为原有 JavaScript（未做删减） =====
        let cosmicMimeDatabase = null;

        async function buildMimeDatabase() {
            if (cosmicMimeDatabase) return cosmicMimeDatabase;
            const response = await fetch('https://cdn.jsdelivr.net/npm/mime-db@1.52.0/db.json');
            const db = await response.json();
            cosmicMimeDatabase = {};
            for (const [mimeType, data] of Object.entries(db)) {
                if (data.extensions) {
                    for (const ext of data.extensions) {
                        cosmicMimeDatabase[ext.toLowerCase()] = mimeType;
                    }
                }
            }
            return cosmicMimeDatabase;
        }

        function getFileMimeType(filename) {
            const extMatch = ("." + filename).split('.').pop()?.toLowerCase();
            if (!extMatch) return 'application/octet-stream';
            return cosmicMimeDatabase && cosmicMimeDatabase[extMatch];
        }

        const mimeIconMap = {
            ext: {
                'pdf': 'fa-file',
                'epub': 'fa-file',
                'azw3': 'fa-file',
                'doc': 'fa-file-word',
                'docx': 'fa-file-word',
                'xls': 'fa-file-excel',
                'xlsx': 'fa-file-excel',
                'ppt': 'fa-file-powerpoint',
                'pptx': 'fa-file-powerpoint',
                'csv': 'fa-file-csv',
                'zip': 'fa-file-zipper',
                'rar': 'fa-file-zipper',
                '7z': 'fa-file-zipper',
                'txt': 'fa-file-lines',
                'md': 'fa-file-lines',
                'json': 'fa-file-code',
                'js': 'fa-file-code',
                'html': 'fa-file-code',
                'css': 'fa-file-code',
                'log': 'fa-file-clipboard',
            },
            type: {
                'video': 'fa-file-video',
                'audio': 'fa-file-audio',
                'image': 'fa-file-image',
                'application': 'fa-file-code',
                'text': 'fa-file-lines',
            }
        };

        function getColorByExt(ext) {
            if (!ext) return 'hsl(200, 60%, 60%)';
            let hash = 2166136261;
            for (let i = 0; i < ext.length; i++) {
                hash ^= ext.charCodeAt(i);
                hash += (hash << 1) + (hash << 7) + (hash << 8) + (hash << 24);
                hash = hash >>> 0;
            }
            const hue = hash % 360;
            const saturation = 60 + (hash % 15);
            const lightness = 55 + (hash % 15);
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        function getFileIcon(filename, isDir) {
            if (isDir) {
                return `<div class="relative inline-block">
                            <i class="fa-solid fa-folder text-yellow-400 text-3xl"></i>
                            <i class="fa-solid fa-star text-cyan-400 text-xs absolute -bottom-1 -right-1 bg-slate-900 px-0.5 rounded-full border border-cyan-500/40 animate-pulse" title="星际目录"></i>
                        </div>`;
            }
            let extMatch = ('.' + filename).split('.').pop()?.toLowerCase();
            const extColor = getColorByExt(extMatch);
            const glowStyle = `color: ${extColor};`;
            if (extMatch.length > 5) extMatch = "";
            const extText = extMatch ? extMatch.toUpperCase() : 'FILE';
            if (extText && mimeIconMap.ext[extText])
                return `<div class="relative inline-block">
                            <i class="fa-solid ${mimeIconMap.ext[extText]} text-3xl" style="${glowStyle}"></i>
                            <span class="absolute -bottom-1.5 -right-1.5 bg-slate-900 text-slate-200 text-[8px] font-extrabold font-orbitron px-1 py-0.5 rounded border border-slate-500 shadow">
                                ${extText}
                            </span>
                        </div>`;
            const mimeType = getFileMimeType(filename);
            const primaryType = mimeType && mimeType.split('/')[0];
            const icon = primaryType && mimeIconMap.type[primaryType] || "fa-file";
            return `<div class="relative inline-block">
                        <i class="fa-solid ${icon} text-3xl" style="${glowStyle}"></i>
                        <span class="absolute -bottom-1.5 -right-1.5 bg-slate-900 text-slate-200 text-[8px] font-extrabold font-orbitron px-1 py-0.5 rounded border border-slate-500 shadow">
                            ${extText}
                        </span>
                    </div>`;
        }

            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(2) + ' ' + units[i];

            const dd = String(date.getDate()).padStart(2, '0');

            const min = String(date.getMinutes()).padStart(2, '0');

        function setupDynamicTypingEffect() {
            const dynamicTextDom = document.getElementById('status-dynamic-text');
            const robotIcon = document.getElementById('robot-icon-wrap');
            let phraseIndex = Math.floor(Math.random() * statusPhrases.length);
            let charIndex = 0;
            let isDeleting = false;
            let typingSpeed = 100;

            function typeLoop() {
                const currentPhrase = statusPhrases[phraseIndex];

                if (!isDeleting) {
                    if (!robotIcon.classList.contains('robot-speaking')) {
                        robotIcon.classList.add('robot-speaking');
                    }
                    dynamicTextDom.textContent = currentPhrase.substring(0, charIndex + 1);
                    charIndex++;
                    typingSpeed = 100 + Math.random() * 100;

                    if (charIndex === currentPhrase.length) {
                        if (robotIcon.classList.contains('robot-speaking')) {
                            robotIcon.classList.remove('robot-speaking');
                        }
                        isDeleting = true;
                        typingSpeed = 1000;
                    }
                } else {
                    dynamicTextDom.textContent = currentPhrase.substring(0, charIndex - 1);
                    charIndex--;
                    typingSpeed = 50;

                    if (charIndex === 0) {
                        isDeleting = false;
                        phraseIndex = Math.floor(Math.random() * statusPhrases.length);
                        typingSpeed = 500;
                    }
                }
                setTimeout(typeLoop, typingSpeed);
            }
            typeLoop();
        }

        async function copyText(text, event) {
            event.stopPropagation();
            if (navigator.clipboard && window.isSecureContext)
                await navigator.clipboard.writeText(text);
            else {
                const temp = document.createElement('textarea');
                temp.value = text;
                temp.style.left = '-9999px';
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
            }
            showToast(`<span style="font-weight: bold;">${text}</span> 已复制`);

            else

            tipBox.style.display = 'block';
            tipBox.style.left = (event.clientX + 16) + 'px';

            const tipHeight = tipBox.offsetHeight || 50;
            if (event.clientY - tipHeight - 16 > 0) {
                tipBox.style.top = (event.clientY - tipHeight - 16) + 'px';

        function bindVirtualScroll(viewportId, contentId, containerId, itemHeight, generateHtmlFn) {
            const viewport = document.getElementById(viewportId);
            const content = document.getElementById(contentId);
            const container = document.getElementById(containerId);

            const totalHeight = cachedFiles.length * itemHeight;
            viewport.style.height = `${Math.min(totalHeight, 650)}px`;

            const renderVisibleItems = () => {
                const scrollTop = viewport.scrollTop;
                const viewHeight = viewport.clientHeight;

                const bufferSize = 3;
                const startIndex = Math.max(0, Math.floor(scrollTop / itemHeight) - bufferSize);
                const endIndex = Math.min(cachedFiles.length - 1, Math.floor((scrollTop + viewHeight) / itemHeight) +
                bufferSize);

                let html = '';
                for (let i = startIndex; i <= endIndex; i++) {
                    const file = cachedFiles[i];
                    if (!file) continue;
                    const iconHtml = getFileIcon(file.name, file.is_dir);
                    html += generateHtmlFn(file, iconHtml, i * itemHeight);
                }
                container.innerHTML = html;
            };

            content.style.height = `${cachedFiles.length * itemHeight}px`;
            viewport.onscroll = renderVisibleItems;

            renderVisibleItems();
        }

        function render() {
            updateStats();

            cachedFiles = [...getFilteredFiles()];

            if (!isOriginalOrder) {
                cachedFiles.sort((a, b) => {
                    let valA = a[currentSort.field];
                    let valB = b[currentSort.field];
                    if (currentSort.field === 'name') {
                        valA = valA.toLowerCase();
                        valB = valB.toLowerCase();
                    }
                    if (valA < valB) return currentSort.asc ? -1 : 1;
                    if (valA > valB) return currentSort.asc ? 1 : -1;
                    return 0;
                });
            }

            bindVirtualScroll(
                'table-viewport',
                'table-content',
                'table-rows-container',
                TABLE_ROW_HEIGHT,
                generateTableRowHtml
            );

            bindVirtualScroll(
                'cards-viewport',
                'cards-content',
                'mobile-cards-container',
                CARD_HEIGHT,
                generateMobileCardHtml
            );
        }

    <!-- ===== Three.js 背景 + 虫洞特效 ===== -->
    <script>
        let scene, camera, renderer, particles, starField;
        let overlayCanvas, ctx;
        let width, height;
        let stars = [];
        let rays = [];
        let entities = [];
        let mouseX = 0,
            mouseY = 0;

        // 用于主题切换时调整 Three.js
        function applyThemeToThree(theme) {
            if (!scene) return;
            if (theme === 'light') {
                scene.background = new THREE.Color(0xf0f4ff);
                if (particles) {
                    const colors = particles.geometry.attributes.color.array;
                    for (let i = 0; i < colors.length; i += 3) {
                        colors[i] *= 0.5;
                        colors[i + 1] *= 0.5;
                        colors[i + 2] *= 0.5;
                    }
                    particles.geometry.attributes.color.needsUpdate = true;
                }
                if (starField) {
                    starField.material.color.setHex(0x333355);
                }
            } else {
                scene.background = new THREE.Color(0x05050f);
                if (particles) {
                    const colors = particles.geometry.attributes.color.array;
                    for (let i = 0; i < colors.length; i += 3) {
                        colors[i] *= 2.0;
                        colors[i + 1] *= 2.0;
                        colors[i + 2] *= 2.0;
                    }
                    particles.geometry.attributes.color.needsUpdate = true;
                }
                if (starField) {
                    starField.material.color.setHex(0x7000ff);
                }
            }
        }
        window.applyThemeToThree = applyThemeToThree;

        function initThreeBackground() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x05050f, 0.0015);
            // 初始根据当前主题设置背景
            const initTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            scene.background = new THREE.Color(initTheme === 'light' ? 0xf0f4ff : 0x05050f);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 500;

            renderer = new THREE.WebGLRenderer({ alpha: false, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 2000;
                positions[i + 1] = (Math.random() - 0.5) * 2000;
                positions[i + 2] = (Math.random() - 0.5) * 2000;

                colors[i] = Math.random() * 0.5 + 0.5;
                colors[i + 1] = Math.random() * 0.8 + 0.2;
                colors[i + 2] = 1.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 3.5,
                transparent: true,
                opacity: 0.75,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const ringGeo = new THREE.BufferGeometry();
            const ringCount = 300;
            const ringPos = new Float32Array(ringCount * 3);
            for (let i = 0; i < ringCount * 3; i += 3) {
                const radius = i * 2 + 50;
                const theta = Math.random() * Math.PI * 2;
                ringPos[i] = Math.cos(theta) * radius;
                ringPos[i + 1] = (Math.random() - 0.5) * 20;
                ringPos[i + 2] = Math.sin(theta) * radius;
            }
            ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
            const ringMat = new THREE.PointsMaterial({ size: 2, color: 0x7000ff });
            starField = new THREE.Points(ringGeo, ringMat);
            scene.add(starField);

            // 根据当前主题调整
            if (initTheme === 'light') {
                applyThemeToThree('light');
            }

            init2DOverlay();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function init2DOverlay() {
            overlayCanvas = document.createElement('canvas');
            overlayCanvas.style.position = 'fixed';
            overlayCanvas.style.top = '0';
            overlayCanvas.style.left = '0';
            overlayCanvas.style.zIndex = '0';
            overlayCanvas.style.pointerEvents = 'auto';
            document.getElementById('canvas-container').appendChild(overlayCanvas);

            ctx = overlayCanvas.getContext('2d');
            width = overlayCanvas.width = window.innerWidth;
            height = overlayCanvas.height = window.innerHeight;

            for (let i = 0; i < 90; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.4 + 0.1
                });
            }

            for (let i = 0; i < 4; i++) {
                rays.push({
                    y: Math.random() * height,
                    speed: Math.random() * 1 + 0.5,
                    amplitude: Math.random() * 40 + 20,
                    frequency: Math.random() * 0.005 + 0.002,
                    phase: Math.random() * Math.PI
                });
            }

            entities = Array.from({ length: 16 }, () => new CosmicEntity());
        }

        class CosmicEntity {
            constructor() {
                this.reset();
            }

            reset() {
                const types = ['monster', 'monsterPlus', 'jellyfish', 'eye', 'blob', 'mecha', 'void_rift'];
                this.type = types[Math.floor(Math.random() * types.length)];
                this.baseRadius = Math.random() * 25 + 12;
                this.radius = this.baseRadius;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;

                const personalities = ['friendly', 'scared', 'neutral', 'angry'];
                this.personality = personalities[Math.floor(Math.random() * personalities.length)];
                this.state = 'calm';
                this.stateTimer = 0;
                this.clickCount = 0;
                this.lastClickTime = 0;

                this.pulseFactor = Math.random() * 10;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
                this.tentacleCount = Math.floor(Math.random() * 6) + 3;

                this.isExploding = false;
                this.explosionParticles = [];
            }

            panic() {
                this.personality = 'angry';
                this.explode();
            }

            update() {
                if (this.isExploding) {
                    this.explosionParticles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.alpha -= 0.02;
                    });
                    this.explosionParticles = this.explosionParticles.filter(p => p.alpha > 0);
                    if (this.explosionParticles.length === 0) {
                        this.reset();
                    }
                    return;
                }

                this.pulseFactor += 0.1;
                this.rotation += this.rotSpeed;

                const distToMouse = Math.hypot(this.x - mouseX, this.y - mouseY);
                const sensingRadius = 150;

                if (distToMouse < sensingRadius && this.state !== 'angry' && this.state !== 'curious') {
                    if (this.personality === 'scared') {
                        this.state = 'fleeing';
                        const angleFromMouse = Math.atan2(this.y - mouseY, this.x - mouseX);
                        this.vx = Math.cos(angleFromMouse) * 5;
                        this.vy = Math.sin(angleFromMouse) * 5;
                    } else if (this.personality === 'friendly') {
                        this.state = 'happy';
                    } else if (this.personality === 'angry') {
                        this.state = 'angry';
                        this.stateTimer = 120;
                    }
                } else if (distToMouse >= sensingRadius && (this.state === 'fleeing' || this.state === 'happy')) {
                    this.state = 'calm';
                }

                if (this.state === 'fleeing') {
                    this.x += this.vx;
                    this.y += this.vy;
                } else if (this.state === 'happy') {
                    this.vx = 0;
                    this.vy = 0;
                    this.radius = this.baseRadius + Math.sin(this.pulseFactor * 2) * 5;
                } else if (this.state === 'angry') {
                    this.x += (Math.random() - 0.5) * 6;
                    this.y += (Math.random() - 0.5) * 6;
                    this.stateTimer--;
                    if (this.stateTimer <= 0) this.state = 'calm';
                } else if (this.state === 'curious') {
                    this.vx = 0;
                    this.vy = 0;
                    this.stateTimer--;
                    if (this.stateTimer <= 0) this.state = 'calm';
                } else {
                    this.radius = this.baseRadius;
                    this.x += this.vx;
                    this.y += this.vy;
                }

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                if (!ctx) return;

                if (this.isExploding) {
                    this.explosionParticles.forEach(p => {
                        ctx.save();
                        ctx.beginPath();
                        ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`;
                        ctx.arc(this.x + p.x, this.y + p.y, p.radius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    });
                    return;
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.shadowBlur = 15;
                ctx.shadowColor = this.state === 'angry' ? '#ff0000' : this.color;

                if (this.type === 'monster') {
                    ctx.fillStyle = this.state === 'angry' ? '#ff2a2a' : this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-this.radius / 2, -this.radius / 4, this.radius / 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.radius / 2, -this.radius / 4, this.radius / 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    const eyeOffset = this.state === 'happy' ? Math.sin(this.pulseFactor) * 3 : 0;
                    ctx.beginPath();
                    ctx.arc(-this.radius / 2, -this.radius / 4 + eyeOffset, this.radius / 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.radius / 2, -this.radius / 4 + eyeOffset, this.radius / 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    if (this.state === 'happy') ctx.arc(0, this.radius / 4, this.radius / 3, 0, Math.PI);
                    else if (this.state === 'angry') ctx.arc(0, this.radius / 2, this.radius / 3, Math.PI, 0);
                    else ctx.moveTo(-this.radius / 3, this.radius / 3);
                    ctx.lineTo(this.radius / 3, this.radius / 3);
                    ctx.stroke();
                } else if (this.type === 'monsterPlus') {
                    ctx.fillStyle = this.state === 'angry' ? '#9d4edd' : '#7000ff';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius, this.radius * 0.8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#00f0ff';
                    ctx.beginPath();
                    ctx.arc(0, -this.radius * 0.2, this.radius * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(0, -this.radius * 0.2, this.radius * 0.18, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff007f';
                    ctx.fillRect(-this.radius * 0.6, this.radius * 0.2, this.radius * 1.2, 4);
                } else if (this.type === 'jellyfish') {
                    ctx.fillStyle = this.state === 'angry' ? 'rgba(255, 50, 50, 0.8)' : this.color.replace('hsl', 'hsla')
                        .replace(')', ', 0.8)');
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, Math.PI, 0);
                    ctx.lineTo(this.radius, this.radius / 2);
                    ctx.lineTo(-this.radius, this.radius / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = ctx.fillStyle;
                    ctx.lineWidth = 3;
                    for (let j = 0; j < this.tentacleCount; j++) {
                        ctx.beginPath();
                        const tx = -this.radius + (this.radius * 2 / (this.tentacleCount - 1)) * j;
                        ctx.moveTo(tx, this.radius / 2);
                        const ty = this.radius + Math.sin(this.pulseFactor + j) * 10;
                        ctx.quadraticCurveTo(tx + Math.cos(this.pulseFactor) * 5, this.radius, tx, ty);
                        ctx.stroke();
                    }
                } else if (this.type === 'eye') {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = this.state === 'angry' ? '#ff0000' : this.color;
                    const mx = Math.cos(this.pulseFactor * 0.5) * this.radius * 0.3;
                    const my = Math.sin(this.pulseFactor * 0.5) * this.radius * 0.3;
                    ctx.beginPath();
                    ctx.arc(mx, my, this.radius * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(mx, my, this.radius * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    if (this.state === 'angry') {
                        ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
                        ctx.lineWidth = 1;
                        for (let k = 0; k < 8; k++) {
                            const ang = Math.random() * Math.PI * 2;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.lineTo(Math.cos(ang) * this.radius, Math.sin(ang) * this.radius);
                            ctx.stroke();
                        }
                    }
                } else if (this.type === 'blob') {
                    ctx.fillStyle = this.state === 'angry' ? '#ff5500' : this.color;
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const angle = (Math.PI * 2 / 8) * i;
                        const warp = 1 + Math.sin(this.pulseFactor + i) * 0.2;
                        const rx = Math.cos(angle) * this.radius * warp;
                        const ry = Math.sin(angle) * this.radius * warp;
                        if (i === 0) ctx.moveTo(rx, ry);
                        else ctx.lineTo(rx, ry);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'mecha') {
                    ctx.strokeStyle = '#00f0ff';
                    ctx.lineWidth = 4;
                    ctx.fillStyle = '#0a0c1a';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fill();

                    ctx.strokeStyle = '#ff007f';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-this.radius * 0.7, 0);
                    ctx.lineTo(this.radius * 0.7, 0);
                    ctx.moveTo(0, -this.radius * 0.7);
                    ctx.lineTo(0, this.radius * 0.7);
                    ctx.stroke();

                    ctx.fillStyle = '#39ff14';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'void_rift') {
                    ctx.fillStyle = '#7000ff';
                    ctx.beginPath();
                    ctx.moveTo(0, -this.radius);
                    ctx.lineTo(this.radius * 0.6, -this.radius * 0.2);
                    ctx.lineTo(this.radius, this.radius * 0.6);
                    ctx.lineTo(this.radius * 0.2, this.radius * 0.2);
                    ctx.lineTo(-this.radius * 0.5, this.radius * 0.9);
                    ctx.lineTo(-this.radius * 0.2, 0);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = '#00f0ff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                ctx.restore();
            }

            checkClick(mx, my) {
                const dist = Math.hypot(this.x - mx, this.y - my);
                if (dist < this.radius + 10 && !this.isExploding) {
                    const now = Date.now();
                    if (now - this.lastClickTime < 500) {
                        this.clickCount++;
                    } else {
                        this.clickCount = 1;
                    }
                    this.lastClickTime = now;

                    if (this.clickCount === 1) {
                        this.state = 'curious';
                        this.stateTimer = 120;
                        this.vx = 0;
                        this.vy = 0;
                    } else if (this.clickCount >= 3) {
                        this.explode();
                    }
                }
            }

            explode() {
                if (this.isExploding) return;
                this.isExploding = true;
                const particleCount = 40 + Math.random() * 25;
                const colorRGB = this.state === 'angry' ? '255, 50, 50' : (this.personality === 'friendly' ?
                    '50, 255, 50' : '200, 200, 200');

                for (let i = 0; i < particleCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 10 + 2;
                    this.explosionParticles.push({
                        x: 0,
                        y: 0,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: Math.random() * 8 + 2,
                        color: Math.random() > 0.3 ? colorRGB : '255, 255, 255',
                        alpha: 1.0
                    });
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.00005;

            if (particles) {
                particles.rotation.x = time * 0.2;
                particles.rotation.y = time * 0.3;
            }
            if (starField) {
                starField.rotation.y = -time * 1.5;
                starField.rotation.x = Math.sin(time) * 0.1;
            }
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }

            if (ctx && overlayCanvas) {
                ctx.clearRect(0, 0, width, height);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fill();
                    star.y += star.speed;
                    if (star.y > height) star.y = 0;
                });

                rays.forEach(ray => {
                    ray.y += ray.speed;
                    if (ray.y > height + 100) ray.y = -100;

                    ctx.strokeStyle = 'rgba(0, 242, 255, 0.15)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let x = 0; x < width; x += 20) {
                        const waveY = ray.y + Math.sin(x * ray.frequency + ray.phase) * ray.amplitude;
                        if (x === 0) ctx.moveTo(x, waveY);
                        else ctx.lineTo(x, waveY);
                    }
                    ctx.stroke();
                    ray.phase += 0.02;
                });

                entities.forEach(ent => {
                    ent.update();
                    ent.draw();
                });
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

            if (overlayCanvas) {
                width = overlayCanvas.width = window.innerWidth;
                height = overlayCanvas.height = window.innerHeight;
            }
            if (wormholeCtx) {
                whW = wormholeCanvas.width = window.innerWidth;
                whH = wormholeCanvas.height = window.innerHeight;
            }
        }

        window.startWarpDrive = function() {
            gsapWarpEffect();
        };

        function gsapWarpEffect() {
            let t = 0;
            const interval = setInterval(() => {
                t += 0.05;
                if (particles) particles.material.size = 3.5 + Math.sin(t) * 20;
                if (t >= Math.PI * 2) {
                    clearInterval(interval);
                    if (particles) particles.material.size = 3.5;
                }
            }, 50);
        }

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            const tipBox = document.getElementById('holocubic-tooltip');
            if (tipBox && tipBox.style.display === 'block') {
                tipBox.style.left = (e.clientX + 16) + 'px';
                const tipHeight = tipBox.offsetHeight || 50;
                if (e.clientY - tipHeight - 16 > 0) {
                    tipBox.style.top = (e.clientY - tipHeight - 16) + 'px';
                } else {
                    tipBox.style.top = (e.clientY + 16) + 'px';
                }
            }
        });

        window.addEventListener('click', (e) => {
            entities.forEach(ent => ent.checkClick(e.clientX, e.clientY));
        });

        initThreeBackground();
    </script>

    <!-- ===== 虫洞特效 ===== -->
    <script>
        let wormholeCanvas, wormholeCtx;
        let whW, whH;
        let tunnelParticles = [];

        function initWormholeCanvas() {
            wormholeCanvas = document.getElementById('wormhole-canvas');
            wormholeCtx = wormholeCanvas.getContext('2d');
            whW = wormholeCanvas.width = window.innerWidth;
            whH = wormholeCanvas.height = window.innerHeight;

            for (let i = 0; i < 250; i++) {
                tunnelParticles.push({
                    x: Math.random() * whW - whW / 2,
                    y: Math.random() * whH - whH / 2,
                    z: Math.random() * 1000 + 1,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`
                });
            }
        }

        function drawWormholeTunnel() {
            wormholeCtx.fillStyle = 'rgba(10, 12, 32, 0.25)';
            wormholeCtx.fillRect(0, 0, whW, whH);

            const centerX = whW / 2;
            const centerY = whH / 2;

            tunnelParticles.forEach(p => {
                p.z -= 8;

                if (p.z <= 0) {
                    p.x = Math.random() * whW - whW / 2;
                    p.y = Math.random() * whH - whH / 2;
                    p.z = 1000;
                }

                const screenX = centerX + (p.x / p.z) * 150;
                const screenY = centerY + (p.y / p.z) * 150;
                const size = (1 - p.z / 1000) * 6;

                wormholeCtx.fillStyle = p.color;
                wormholeCtx.beginPath();
                wormholeCtx.arc(screenX, screenY, Math.max(0.5, size), 0, Math.PI * 2);
                wormholeCtx.fill();

                wormholeCtx.strokeStyle = p.color;
                wormholeCtx.lineWidth = size * 0.5;
                wormholeCtx.beginPath();
                const prevX = centerX + (p.x / (p.z + 15)) * 150;
                const prevY = centerY + (p.y / (p.z + 15)) * 150;
                wormholeCtx.moveTo(prevX, prevY);
                wormholeCtx.lineTo(screenX, screenY);
                wormholeCtx.stroke();
            });
        }

        let whAnimateFrame;
        let isWormholeActive = false;

        function startWormholeTunnel() {
            if (isWormholeActive) return;
            isWormholeActive = true;

            const whEl = document.getElementById('wormhole-canvas');
            whEl.style.opacity = '1';

            function loop() {
                drawWormholeTunnel();
                if (isWormholeActive) {
                    whAnimateFrame = requestAnimationFrame(loop);
                }
            }
            loop();

            setTimeout(() => {
                isWormholeActive = false;
                cancelAnimationFrame(whAnimateFrame);
                whEl.style.opacity = '0';
            }, 5000);
        }

        function triggerQuantumStorm() {
            const appBody = document.getElementById('app-body');
            appBody.classList.add('quantum-storm-active');

            setTimeout(() => {
                appBody.classList.remove('quantum-storm-active');
            }, 2400);
        }
    </script>
